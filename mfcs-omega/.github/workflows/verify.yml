name: Verify

on:
  push:
    paths:
      - "spec/**"
      - "tlc/**"
      - "tools/verify.sh"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run verification
        run: |
          cd tools
          chmod +x verify.sh
          ./verify.sh
